spring.application.name=umbrella-point
server.port=8092

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:umbrellapoint}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:app_user}
spring.datasource.password=${DB_PASSWORD:app_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:umbrella-point-super-secret-key-for-jwt-token-generation-2024}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

credit.min-score=${CREDIT_MIN_SCORE:60}
credit.default-borrow-limit=${CREDIT_DEFAULT_BORROW_LIMIT:1}
credit.tier1-threshold=${CREDIT_TIER1_THRESHOLD:70}
credit.tier1-borrow-limit=${CREDIT_TIER1_BORROW_LIMIT:2}
credit.tier2-threshold=${CREDIT_TIER2_THRESHOLD:85}
credit.tier2-borrow-limit=${CREDIT_TIER2_BORROW_LIMIT:3}
credit.tier3-threshold=${CREDIT_TIER3_THRESHOLD:95}
credit.tier3-borrow-limit=${CREDIT_TIER3_BORROW_LIMIT:5}
credit.score-recovery-daily=${CREDIT_SCORE_RECOVERY_DAILY:1}
credit.score-recovery-max=${CREDIT_SCORE_RECOVERY_MAX:100}
credit.overdue-penalty=${CREDIT_OVERDUE_PENALTY:5}

cross-region-fee.enabled=${CROSS_REGION_FEE_ENABLED:true}
cross-region-fee.base-fee=${CROSS_REGION_BASE_FEE:2.00}
cross-region-fee.per-km-fee=${CROSS_REGION_PER_KM_FEE:1.00}
cross-region-fee.min-fee=${CROSS_REGION_MIN_FEE:2.00}
cross-region-fee.max-fee=${CROSS_REGION_MAX_FEE:20.00}
cross-region-fee.free-distance-km=${CROSS_REGION_FREE_DISTANCE_KM:1.0}
cross-region-fee.settlement-period-days=${CROSS_REGION_SETTLEMENT_PERIOD_DAYS:7}
cross-region-fee.refund-valid-days=${CROSS_REGION_REFUND_VALID_DAYS:3}
cross-region-fee.nearby-station-radius-km=${CROSS_REGION_NEARBY_RADIUS_KM:3.0}
cross-region-fee.nearby-station-limit=${CROSS_REGION_NEARBY_LIMIT:5}
