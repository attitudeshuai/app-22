services:
  app:
    build: .
    container_name: umbrellapoint_app
    ports:
      - "8092:8092"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=umbrellapoint
      - DB_USER=app_user
      - DB_PASSWORD=app_pass
      - JWT_SECRET=umbrella-point-super-secret-key-for-jwt-token-generation-2024
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: umbrellapoint_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=umbrellapoint
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=app_pass
    ports:
      - "13317:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_pass"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

volumes:
  mysql_data:
